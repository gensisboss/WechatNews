name: Daily News Website

on:
  push:
    branches:
      - main
  schedule:
    # 09:00 Asia/Shanghai.
    - cron: "0 1 * * *"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build-site:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Run tests
        run: python -m unittest discover -s tests -v

      - name: Generate digest website
        run: python src/main.py --config config.yml --sources sources.yml --output output --dry-run

      - name: Prepare GitHub Pages site
        run: |
          latest_html="$(ls -t output/*.html | head -n 1)"
          cp "$latest_html" output/index.html
          echo "news.gongganghao.com" > output/CNAME
          touch output/.nojekyll

      - name: Upload generated digest
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: wechat-news-digest
          path: output/

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v5

      - name: Upload GitHub Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: output

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
